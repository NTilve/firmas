<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Maestro 2026 - Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración Global proporcionada por el entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'directorio-maestro-2026';

        // Estado de la App
        let records = [];
        let globalVersions = [];
        let user = null;
        let selectedOrder = [];
        let currentFilter = 'all';
        let activeEditId = null;
        let isFirmaDirty = false;

        const CONFIG = {
            grupos: {
                'Presidente/a': 'ejecutivo',
                'Vicepresidente/a': 'ejecutivo',
                'Jefe/a de Gabinete': 'ejecutivo',
                'Ministro/a': 'ejecutivo',
                'Diputado/a': 'diputados',
                'Senador/a': 'senadores'
            },
            conectoresNombres: ['de la', 'de los', 'de las', 'del', 'de', 'la', 'los', 'las']
        };

        // --- AUTHENTICATION ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error de autenticación:", error);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                console.log("Sesión activa:", user.uid);
                initDataListeners();
            }
        });

        // --- DATA LISTENERS (Real-time) ---
        const initDataListeners = () => {
            if (!user) return;

            // Escuchar Registros
            const qRecords = collection(db, 'artifacts', appId, 'public', 'data', 'autoridades');
            onSnapshot(qRecords, (snapshot) => {
                records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            }, (error) => console.error("Error cargando registros:", error));

            // Escuchar Historial Global
            const qHistory = collection(db, 'artifacts', appId, 'public', 'data', 'historial');
            onSnapshot(qHistory, (snapshot) => {
                globalVersions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderGlobalHistory();
            });
        };

        // --- LÓGICA DE NEGOCIO ---
        window.generateAutoFirma = (nombres, apellidos) => {
            if (!nombres.trim() && !apellidos.trim()) return "";
            const parts = nombres.trim().split(/\s+/);
            let resultNombres = [parts[0]];
            for (let i = 1; i < parts.length; i++) {
                const current = parts[i];
                const prev = parts[i-1];
                if (CONFIG.conectoresNombres.includes(current.toLowerCase())) {
                    resultNombres.push(current);
                } else {
                    const prevWasConnector = CONFIG.conectoresNombres.includes(prev?.toLowerCase());
                    resultNombres.push(prevWasConnector ? current : current[0].toUpperCase() + ".");
                }
            }
            return `${resultNombres.join(' ')} ${apellidos.trim()}.`.trim();
        };

        window.saveRecord = async () => {
            if (!user) return;
            const lastName = document.getElementById('editLastName').value.trim();
            const firstName = document.getElementById('editFirstName').value.trim();
            const firma = document.getElementById('editFirma').value.trim();
            const cargo = document.getElementById('editCargo').value;
            const now = new Date().toLocaleString('es-AR').slice(0, 16);

            if (!lastName || !firstName) return;

            const data = {
                apellido: lastName,
                nombres: firstName,
                firma: firma || generateAutoFirma(firstName, lastName),
                cargo: cargo,
                grupo: CONFIG.grupos[cargo],
                active: true,
                lastUpdated: now,
                updatedBy: user.uid
            };

            try {
                if (activeEditId === null) {
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'autoridades'), {
                        ...data,
                        history: [{ date: now, action: "Alta de registro.", user: user.uid }]
                    });
                    await registerGlobalEvent(`Alta: ${lastName}`);
                } else {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'autoridades', activeEditId);
                    const currentRecord = records.find(r => r.id === activeEditId);
                    const newHistory = [...(currentRecord.history || []), { date: now, action: "Edición.", user: user.uid }];
                    await updateDoc(docRef, { ...data, history: newHistory });
                    await registerGlobalEvent(`Edición: ${lastName}`);
                }
                window.closeEditPanel();
            } catch (e) {
                console.error("Error guardando:", e);
            }
        };

        window.deleteRecord = async (id) => {
            if (!user) return;
            const r = records.find(x => x.id === id);
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'autoridades', id);
            const now = new Date().toLocaleString('es-AR').slice(0, 16);
            const newHistory = [...(r.history || []), { date: now, action: "Enviado a papelera.", user: user.uid }];

            await updateDoc(docRef, { active: false, history: newHistory });
            await registerGlobalEvent(`Baja: ${r.apellido}`);
        };

        window.restoreRecord = async (id) => {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'autoridades', id);
            await updateDoc(docRef, { active: true });
            await registerGlobalEvent(`Restauración ID: ${id}`);
        };

        const registerGlobalEvent = async (msg) => {
            const now = new Date().toLocaleString('es-AR').slice(0, 16);
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'historial'), {
                date: now,
                desc: msg,
                user: user.uid,
                timestamp: Date.now()
            });
        };

        // UI Handlers (Exponer al objeto window para que el HTML los vea)
        window.handleNameInput = () => {
            if (isFirmaDirty) return;
            const n = document.getElementById('editFirstName').value;
            const a = document.getElementById('editLastName').value;
            document.getElementById('editFirma').value = generateAutoFirma(n, a);
        };

        window.handleFirmaManual = () => { isFirmaDirty = true; };

        window.openCreatePanel = () => {
            activeEditId = null;
            isFirmaDirty = false;
            document.getElementById('panelTitle').innerText = "Nuevo Registro";
            document.getElementById('editLastName').value = "";
            document.getElementById('editFirstName').value = "";
            document.getElementById('editFirma').value = "";
            document.getElementById('historySection').classList.add('hidden');
            document.getElementById('editPanelOverlay').classList.remove('hidden');
            document.getElementById('editPanel').classList.replace('panel-hidden', 'panel-visible');
        };

        window.openEditPanel = (id, e) => {
            if (e && (e.target.type === 'checkbox' || e.target.tagName === 'BUTTON')) return;
            activeEditId = id;
            const r = records.find(x => x.id === id);
            isFirmaDirty = true;

            document.getElementById('panelTitle').innerText = "Editar Autoridad";
            document.getElementById('editLastName').value = r.apellido;
            document.getElementById('editFirstName').value = r.nombres;
            document.getElementById('editFirma').value = r.firma;
            document.getElementById('editCargo').value = r.cargo;
            document.getElementById('historySection').classList.remove('hidden');

            const histBody = document.getElementById('individualHistory');
            histBody.innerHTML = (r.history || []).slice().reverse().map(h => `
                <div class="flex gap-2 mb-2 pb-2 border-b border-stone-50">
                    <span class="text-[9px] text-stone-300 font-bold">${h.date}</span>
                    <span class="text-stone-600 font-medium">${h.action}</span>
                </div>
            `).join('');

            document.getElementById('editPanelOverlay').classList.remove('hidden');
            document.getElementById('editPanel').classList.replace('panel-hidden', 'panel-visible');
        };

        window.closeEditPanel = () => {
            document.getElementById('editPanelOverlay').classList.add('hidden');
            document.getElementById('editPanel').classList.replace('panel-visible', 'panel-hidden');
        };

        window.toggleSelect = (id) => {
            const index = selectedOrder.indexOf(id);
            if (index > -1) selectedOrder.splice(index, 1);
            else selectedOrder.push(id);
            renderTable();
            updateFab();
        };

        window.copySignatures = () => {
            const text = selectedOrder.map(id => records.find(x => x.id === id)?.firma).filter(Boolean).join(' — ');
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
        };

        // Render Functions
        const renderAll = () => {
            renderTable();
            renderTrash();
            updateFab();
        };

        const renderTable = () => {
            const body = document.getElementById('masterTableBody');
            const search = document.getElementById('masterSearch').value.toLowerCase();

            const filtered = records.filter(r =>
                r.active &&
                (currentFilter === 'all' || r.grupo === currentFilter) &&
                (r.apellido.toLowerCase().includes(search) || r.firma.toLowerCase().includes(search))
            ).sort((a,b) => a.apellido.localeCompare(b.apellido));

            body.innerHTML = filtered.map(r => `
                <tr class="row-${r.grupo} hover:bg-stone-50 cursor-pointer border-b border-stone-100 transition-colors ${selectedOrder.includes(r.id) ? 'bg-blue-50/30' : ''}" onclick="openEditPanel('${r.id}', event)">
                    <td class="px-4 py-3" onclick="event.stopPropagation()">
                        <input type="checkbox" class="w-4 h-4 rounded" ${selectedOrder.includes(r.id) ? 'checked' : ''} onchange="toggleSelect('${r.id}')">
                    </td>
                    <td class="px-4 py-3 font-bold text-stone-700">${r.apellido}, ${r.nombres}</td>
                    <td class="px-4 py-3 text-stone-400 text-xs">${r.cargo}</td>
                    <td class="px-4 py-3 italic font-serif text-blue-700 select-all">${r.firma}</td>
                    <td class="px-4 py-3 text-right" onclick="event.stopPropagation()">
                        <button onclick="deleteRecord('${r.id}')" class="hover:text-red-500 text-stone-300 transition-colors">🗑️</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('counterLabel').innerText = `${filtered.length} Registros Activos`;
        };

        const renderTrash = () => {
            const deleted = records.filter(r => !r.active);
            document.getElementById('trashTableBody').innerHTML = deleted.map(r => `
                <tr class="border-b border-stone-100">
                    <td class="px-4 py-3 font-bold text-stone-600">${r.apellido}, ${r.nombres}</td>
                    <td class="px-4 py-3 text-right">
                        <button onclick="restoreRecord('${r.id}')" class="text-[10px] font-black border border-stone-200 px-4 py-1 rounded uppercase tracking-widest hover:bg-stone-100">Restaurar</button>
                    </td>
                </tr>
            `).join('');
        };

        const renderGlobalHistory = () => {
            const sortedHistory = globalVersions.sort((a,b) => b.timestamp - a.timestamp);
            document.getElementById('versionTimeline').innerHTML = sortedHistory.slice(0, 20).map(v => `
                <div class="bg-white p-3 rounded-lg border border-stone-100 shadow-sm flex gap-3 text-xs mb-2">
                    <div class="font-black text-blue-500 uppercase min-w-[100px]">${v.date}</div>
                    <div class="text-stone-600 font-medium">${v.desc} <span class="text-[9px] text-stone-300 ml-2">por ${v.user.slice(-4)}</span></div>
                </div>
            `).join('');
        };

        const updateFab = () => {
            const fab = document.getElementById('actionFab');
            document.getElementById('fabCount').innerText = selectedOrder.length;
            if (selectedOrder.length > 0) fab.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            else fab.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
        };

        window.setFilter = (f) => {
            currentFilter = f;
            document.querySelectorAll('#groupFilters button').forEach(b => {
                b.classList.toggle('bg-stone-900', b.dataset.filter === f);
                b.classList.toggle('text-white', b.dataset.filter === f);
            });
            renderTable();
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('border-b-2', 'border-stone-800', 'text-stone-800'));
            document.getElementById(`tab-${tab}`).classList.add('border-b-2', 'border-stone-800', 'text-stone-800');
        };

        // Iniciar
        initAuth();
        document.getElementById('masterSearch').addEventListener('input', renderTable);
    </script>
    <style>
        .row-diputados { border-left: 4px solid #38bdf8; }
        .row-senadores { border-left: 4px solid #fb7185; }
        .row-ejecutivo { border-left: 4px solid #94a3b8; }
        .panel-hidden { transform: translateX(100%); }
        .panel-visible { transform: translateX(0); transition: transform 0.3s ease; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 font-sans antialiased">

    <header class="bg-white border-b border-stone-200 py-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-xl font-black text-stone-800 tracking-tight">🏛️ Directorio Cloud 2026</h1>
            <nav class="flex gap-6 text-[10px] font-black text-stone-400 uppercase tracking-widest">
                <button onclick="switchTab('main')" id="tab-main" class="py-2 border-b-2 border-stone-800 text-stone-800">Directorio</button>
                <button onclick="switchTab('history')" id="tab-history" class="py-2">Log Global</button>
                <button onclick="switchTab('trash')" id="tab-trash" class="py-2">Papelera</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- VISTA PRINCIPAL -->
        <div id="view-main" class="view-section">
            <div class="flex flex-col md:flex-row gap-3 mb-6">
                <div class="flex-grow relative">
                    <input type="text" id="masterSearch" placeholder="Buscar autoridad..."
                           class="w-full pl-10 pr-4 py-2 bg-white border border-stone-200 rounded-lg text-sm shadow-sm outline-none focus:ring-2 focus:ring-blue-400">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-30">🔍</span>
                </div>
                <div id="groupFilters" class="flex gap-1 bg-stone-200/50 p-1 rounded-lg">
                    <button onclick="setFilter('all')" data-filter="all" class="bg-stone-900 text-white px-4 py-1.5 rounded-md text-[9px] font-black uppercase tracking-tighter">Todos</button>
                    <button onclick="setFilter('ejecutivo')" data-filter="ejecutivo" class="px-4 py-1.5 rounded-md text-[9px] font-black uppercase tracking-tighter">Ejecutivo</button>
                    <button onclick="setFilter('senadores')" data-filter="senadores" class="px-4 py-1.5 rounded-md text-[9px] font-black uppercase tracking-tighter">Senado</button>
                    <button onclick="setFilter('diputados')" data-filter="diputados" class="px-4 py-1.5 rounded-md text-[9px] font-black uppercase tracking-tighter">Diputados</button>
                </div>
                <button onclick="openCreatePanel()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-black text-[10px] uppercase shadow-md">+ Nuevo</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-stone-50 border-b border-stone-200">
                        <tr>
                            <th class="px-4 py-3 w-10"></th>
                            <th class="px-4 py-3 text-[10px] font-black uppercase text-stone-400">Autoridad</th>
                            <th class="px-4 py-3 text-[10px] font-black uppercase text-stone-400">Cargo</th>
                            <th class="px-4 py-3 text-[10px] font-black uppercase text-stone-400">Firma</th>
                            <th class="px-4 py-3 w-10"></th>
                        </tr>
                    </thead>
                    <tbody id="masterTableBody" class="text-sm"></tbody>
                </table>
            </div>
            <p id="counterLabel" class="mt-4 text-[9px] font-black text-stone-400 uppercase tracking-widest text-center"></p>
        </div>

        <!-- VISTA HISTORIAL -->
        <div id="view-history" class="view-section hidden">
            <h2 class="text-xs font-black uppercase mb-4 text-stone-400 tracking-widest">Actividad Reciente</h2>
            <div id="versionTimeline"></div>
        </div>

        <!-- VISTA PAPELERA -->
        <div id="view-trash" class="view-section hidden">
            <h2 class="text-xs font-black uppercase mb-4 text-red-400 tracking-widest">Registros Eliminados</h2>
            <div class="bg-white rounded-xl border border-stone-200 overflow-hidden">
                <table class="w-full text-left">
                    <tbody id="trashTableBody" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- PANEL LATERAL -->
    <div id="editPanelOverlay" class="fixed inset-0 bg-stone-900/40 hidden z-50" onclick="closeEditPanel()"></div>
    <div id="editPanel" class="fixed top-0 right-0 h-full w-full max-w-sm bg-white shadow-2xl z-[60] panel-hidden flex flex-col">
        <div class="p-6 border-b border-stone-100 flex justify-between items-center bg-stone-50">
            <h3 id="panelTitle" class="font-black text-stone-800 uppercase tracking-tight text-sm">Editar Registro</h3>
            <button onclick="closeEditPanel()" class="text-stone-300 hover:text-stone-900 text-2xl">&times;</button>
        </div>
        <div class="p-6 flex-grow overflow-y-auto space-y-4">
            <div>
                <label class="text-[9px] font-black text-stone-400 uppercase block mb-1">Apellidos</label>
                <input type="text" id="editLastName" oninput="handleNameInput()" class="w-full p-2 border border-stone-200 rounded text-sm font-bold">
            </div>
            <div>
                <label class="text-[9px] font-black text-stone-400 uppercase block mb-1">Nombres</label>
                <input type="text" id="editFirstName" oninput="handleNameInput()" class="w-full p-2 border border-stone-200 rounded text-sm font-bold">
            </div>
            <div>
                <label class="text-[9px] font-black text-stone-400 uppercase block mb-1">Cargo</label>
                <select id="editCargo" class="w-full p-2 border border-stone-200 rounded text-sm font-bold bg-stone-50">
                    <option value="Presidente/a">Presidente/a</option>
                    <option value="Vicepresidente/a">Vicepresidente/a</option>
                    <option value="Jefe/a de Gabinete">Jefe/a de Gabinete</option>
                    <option value="Ministro/a">Ministro/a</option>
                    <option value="Diputado/a">Diputado/a</option>
                    <option value="Senador/a">Senador/a</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] font-black text-stone-400 uppercase block mb-1">Firma Proyectada</label>
                <input type="text" id="editFirma" oninput="handleFirmaManual()" class="w-full p-2 bg-blue-50 border border-blue-100 rounded text-sm italic font-serif text-blue-800">
            </div>

            <div id="historySection" class="pt-6 border-t border-stone-100">
                <p class="text-[9px] font-black text-stone-300 uppercase mb-3">Historial Individual</p>
                <div id="individualHistory" class="space-y-2"></div>
            </div>
        </div>
        <div class="p-6 border-t border-stone-100 flex gap-2 bg-stone-50">
            <button onclick="saveRecord()" class="flex-grow bg-stone-900 text-white font-black py-3 rounded-lg text-[10px] uppercase tracking-widest hover:bg-black transition-all">Guardar</button>
        </div>
    </div>

    <!-- BOTÓN COPIAR -->
    <div id="actionFab" class="fixed bottom-6 right-6 opacity-0 translate-y-10 pointer-events-none transition-all">
        <button onclick="copySignatures()" class="bg-stone-900 text-white px-8 py-4 rounded-full shadow-2xl flex items-center gap-3 hover:scale-105 active:scale-95 transition-all">
            <span class="text-[10px] font-black uppercase tracking-widest">Copiar Firmas (<span id="fabCount">0</span>)</span>
        </button>
    </div>

</body>
</html>
